<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rubber Band Clock</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 56.25vw;
    max-height: 100vh;
    max-width: 177.78vh;
  }
</style>
</head>
<body>
<canvas id="clock"></canvas>
<script>
// Visible canvas — only ever receives completed frames
const canvas = document.getElementById('clock');
const ctx    = canvas.getContext('2d');

const W = 1920, H = 1080;
canvas.width  = W;
canvas.height = H;

// Offscreen canvas — all drawing happens here first
const oc  = document.createElement(‘canvas’);
oc.width  = W;
oc.height = H;
const c   = oc.getContext(‘2d’); // <– all draw calls use ‘c’, never ‘ctx’

const cx = W / 2, cy = H / 2;
const OUTER_R     = 390;
const INNER_R     = 240;
const PIN_R       = 18;
const START_ANGLE = -Math.PI / 2;
const LIGHT_OX    = -4;
const LIGHT_OY    =  6;

// ─── Time ────────────────────────────────────────────────────────────────────

function getAngles() {
const now  = new Date();
const oslo = new Date(now.toLocaleString(‘en-US’, { timeZone: ‘Europe/Oslo’ }));
const hours   = oslo.getHours() % 12;
const minutes = oslo.getMinutes();
const seconds = oslo.getSeconds();
const ms      = oslo.getMilliseconds();
const totalSeconds = hours * 3600 + minutes * 60 + seconds + ms / 1000;
const totalMinutes = minutes + seconds / 60 + ms / 60000;
return {
outerAngle: (totalMinutes / 60)    * Math.PI * 2,
innerAngle: (totalSeconds / 43200) * Math.PI * 2,
};
}

// ─── Background ───────────────────────────────────────────────────────────────

function drawBackground() {
c.fillStyle = ‘#22252c’;
c.fillRect(0, 0, W, H);
const vig = c.createRadialGradient(cx, cy, H*0.15, cx, cy, H*0.82);
vig.addColorStop(0, ‘rgba(0,0,0,0)’);
vig.addColorStop(1, ‘rgba(0,0,0,0.5)’);
c.fillStyle = vig;
c.fillRect(0, 0, W, H);
}

// ─── Cast shadow ──────────────────────────────────────────────────────────────

function drawCastShadow(x, y, r, elevation) {
const ox = elevation*0.5, oy = elevation*0.85;
const spread = r + elevation*1.2;
const sg = c.createRadialGradient(x+ox, y+oy, r*0.2, x+ox, y+oy, spread);
sg.addColorStop(0,   ‘rgba(0,0,0,0.6)’);
sg.addColorStop(0.4, ‘rgba(0,0,0,0.25)’);
sg.addColorStop(1,   ‘rgba(0,0,0,0)’);
c.beginPath();
c.arc(x+ox, y+oy, spread, 0, Math.PI*2);
c.fillStyle = sg;
c.fill();
}

// ─── Disc ─────────────────────────────────────────────────────────────────────

function drawDisc(x, y, r, elevation) {
drawCastShadow(x, y, r, elevation);
c.save();
c.beginPath();
c.arc(x, y, r, 0, Math.PI*2);
c.clip();

const base = c.createRadialGradient(x-r*0.45, y-r*0.45, r*0.05, x+r*0.1, y+r*0.1, r*1.4);
base.addColorStop(0,   ‘#3e434d’);
base.addColorStop(0.4, ‘#2e3238’);
base.addColorStop(1,   ‘#181b20’);
c.fillStyle = base;
c.fillRect(x-r, y-r, r*2, r*2);

const edgeDark = c.createRadialGradient(x, y, r*0.7, x, y, r);
edgeDark.addColorStop(0, ‘rgba(0,0,0,0)’);
edgeDark.addColorStop(1, ‘rgba(0,0,0,0.5)’);
c.fillStyle = edgeDark;
c.fillRect(x-r, y-r, r*2, r*2);

c.restore();

const halo = c.createRadialGradient(x, y, r-6, x, y, r+4);
halo.addColorStop(0,   ‘rgba(0,0,0,0)’);
halo.addColorStop(0.6, ‘rgba(0,0,0,0.35)’);
halo.addColorStop(1,   ‘rgba(0,0,0,0)’);
c.beginPath();
c.arc(x, y, r+4, 0, Math.PI*2);
c.fillStyle = halo;
c.fill();
}

function drawInnerOnOuterShadow() {
c.save();
c.beginPath();
c.arc(cx, cy, OUTER_R, 0, Math.PI*2, false);
c.arc(cx, cy, INNER_R, 0, Math.PI*2, true);
c.clip();
const sg = c.createRadialGradient(cx+6, cy+10, INNER_R*0.7, cx+6, cy+10, INNER_R+30);
sg.addColorStop(0,   ‘rgba(0,0,0,0)’);
sg.addColorStop(0.6, ‘rgba(0,0,0,0.22)’);
sg.addColorStop(1,   ‘rgba(0,0,0,0)’);
c.fillStyle = sg;
c.beginPath();
c.arc(cx+6, cy+10, INNER_R+30, 0, Math.PI*2);
c.fill();
c.restore();
}

function drawAxle() {
const r = 22;
drawCastShadow(cx, cy, r, 8);
const g = c.createRadialGradient(cx-r*0.35, cy-r*0.35, 1, cx, cy, r);
g.addColorStop(0,   ‘#4a4e58’);
g.addColorStop(0.6, ‘#2a2d35’);
g.addColorStop(1,   ‘#14161a’);
c.beginPath();
c.arc(cx, cy, r, 0, Math.PI*2);
c.fillStyle = g;
c.fill();
const halo = c.createRadialGradient(cx, cy, r-4, cx, cy, r+3);
halo.addColorStop(0, ‘rgba(0,0,0,0)’);
halo.addColorStop(1, ‘rgba(0,0,0,0.4)’);
c.beginPath();
c.arc(cx, cy, r+3, 0, Math.PI*2);
c.fillStyle = halo;
c.fill();
}

// ─── Rubber band ─────────────────────────────────────────────────────────────

function buildBandPath(pins, offsetX, offsetY) {
const ox = offsetX || 0, oy = offsetY || 0;
const n = pins.length, r = pins[0].r;
let gcx = 0, gcy = 0;
for (const p of pins) { gcx += p.x; gcy += p.y; }
gcx /= n; gcy /= n;

const sorted = […pins].sort((a, b) =>
Math.atan2(a.y-gcy, a.x-gcx) - Math.atan2(b.y-gcy, b.x-gcx)
);

const dep = [], arr = [];
for (let i = 0; i < n; i++) {
const j = (i+1)%n;
const pi = sorted[i], pj = sorted[j];
const dx = pj.x-pi.x, dy = pj.y-pi.y;
const len = Math.sqrt(dx*dx+dy*dy);
if (len < 0.001) {
dep[i] = {x:pi.x+ox, y:pi.y+oy};
arr[i] = {x:pj.x+ox, y:pj.y+oy};
continue;
}
const nx = dy/len, ny = -dx/len;
dep[i] = {x:pi.x+r*nx+ox, y:pi.y+r*ny+oy};
arr[i] = {x:pj.x+r*nx+ox, y:pj.y+r*ny+oy};
}

c.beginPath();
for (let i = 0; i < n; i++) {
const prev  = (i-1+n)%n;
const pin   = sorted[i];
const arrPt = arr[prev];
const depPt = dep[i];
const sa = Math.atan2(arrPt.y-(pin.y+oy), arrPt.x-(pin.x+ox));
const ea = Math.atan2(depPt.y-(pin.y+oy), depPt.x-(pin.x+ox));
if (i === 0) c.moveTo(arrPt.x, arrPt.y);
c.arc(pin.x+ox, pin.y+oy, r, sa, ea, false);
c.lineTo(arr[i].x, arr[i].y);
}
c.closePath();
}

function drawBandShadow(pins) {
c.save();
c.beginPath();
c.arc(cx, cy, OUTER_R, 0, Math.PI*2, false);
c.arc(cx, cy, INNER_R, 0, Math.PI*2, true);
c.clip();

buildBandPath(pins, LIGHT_OX*2.5, LIGHT_OY*2.5);
c.lineWidth = 22; c.strokeStyle = ‘rgba(0,0,0,0.12)’;
c.lineJoin = ‘round’; c.lineCap = ‘round’; c.stroke();

buildBandPath(pins, LIGHT_OX*1.8, LIGHT_OY*1.8);
c.lineWidth = 13; c.strokeStyle = ‘rgba(0,0,0,0.20)’;
c.lineJoin = ‘round’; c.lineCap = ‘round’; c.stroke();

buildBandPath(pins, LIGHT_OX, LIGHT_OY);
c.lineWidth = 7; c.strokeStyle = ‘rgba(0,0,0,0.22)’;
c.lineJoin = ‘round’; c.lineCap = ‘round’; c.stroke();

c.restore();
}

function drawRubberBand(pins) {
const xs = pins.map(p=>p.x), ys = pins.map(p=>p.y);
const grad = c.createLinearGradient(
Math.min(…xs), Math.min(…ys),
Math.max(…xs), Math.max(…ys)
);
grad.addColorStop(0,    ‘#8a6010’);
grad.addColorStop(0.25, ‘#d4a022’);
grad.addColorStop(0.5,  ‘#c49018’);
grad.addColorStop(0.75, ‘#e8b828’);
grad.addColorStop(1,    ‘#9a7014’);

c.save();

buildBandPath(pins);
c.lineWidth = 15; c.strokeStyle = ‘rgba(0,0,0,0.30)’;
c.lineJoin = ‘round’; c.stroke();

buildBandPath(pins);
c.lineWidth = 9; c.strokeStyle = grad;
c.lineJoin = ‘round’; c.stroke();

buildBandPath(pins);
c.lineWidth = 2; c.strokeStyle = ‘rgba(255,235,150,0.28)’;
c.stroke();

c.restore();
}

function drawPin(x, y, r) {
drawCastShadow(x, y, r, 10);
const g = c.createRadialGradient(x-r*0.38, y-r*0.4, r*0.04, x+r*0.1, y+r*0.1, r*1.1);
g.addColorStop(0,   ‘#e8c84a’);
g.addColorStop(0.5, ‘#b88a18’);
g.addColorStop(1,   ‘#5a3c06’);
c.beginPath();
c.arc(x, y, r, 0, Math.PI*2);
c.fillStyle = g;
c.fill();

const edge = c.createRadialGradient(x, y, r*0.6, x, y, r);
edge.addColorStop(0, ‘rgba(0,0,0,0)’);
edge.addColorStop(1, ‘rgba(0,0,0,0.4)’);
c.beginPath();
c.arc(x, y, r, 0, Math.PI*2);
c.fillStyle = edge;
c.fill();

c.beginPath();
c.arc(x-r*0.28, y-r*0.3, r*0.32, 0, Math.PI*2);
c.fillStyle = ‘rgba(255,245,190,0.35)’;
c.fill();
}

// ─── Render loop ──────────────────────────────────────────────────────────────

const TARGET_FPS = 30;
const FRAME_MS   = 1000 / TARGET_FPS;
let lastFrame    = 0;

function draw(timestamp) {
requestAnimationFrame(draw);
if (timestamp - lastFrame < FRAME_MS) return;
lastFrame = timestamp;

// Draw everything to offscreen canvas
c.clearRect(0, 0, W, H);

const { outerAngle, innerAngle } = getAngles();

drawBackground();
drawDisc(cx, cy, OUTER_R, 14);
drawInnerOnOuterShadow();
drawDisc(cx, cy, INNER_R, 22);
drawAxle();

const pins = [
{ x: cx, y: cy, r: PIN_R },
{
x: cx + Math.cos(START_ANGLE + innerAngle) * (INNER_R * 0.65),
y: cy + Math.sin(START_ANGLE + innerAngle) * (INNER_R * 0.65),
r: PIN_R
},
{
x: cx + Math.cos(START_ANGLE + outerAngle) * (OUTER_R * 0.72),
y: cy + Math.sin(START_ANGLE + outerAngle) * (OUTER_R * 0.72),
r: PIN_R
}
];

drawBandShadow(pins);
drawRubberBand(pins);
pins.forEach(p => drawPin(p.x, p.y, p.r));

// Blit completed frame to visible canvas in one single operation
ctx.drawImage(oc, 0, 0);
}

requestAnimationFrame(draw);
</script>

</body>
</html>
